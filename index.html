<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Notas</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body, html {
            margin: 0; 
            padding: 0; 
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden; /* Evita que la pantalla entera se mueva */
        }

        /* --- AVISO FLOTANTE DE GUARDADO (CHECK) --- */
        #notificacion {
            display: none; 
            position: fixed; 
            top: 20px; 
            left: 50%;
            transform: translateX(-50%); 
            -webkit-transform: translateX(-50%); /* iPad 2 */
            background-color: #4CAF50; 
            color: white;
            padding: 15px 30px; 
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 18px; 
            font-weight: bold; 
            z-index: 1000;
        }

        /* --- ESTRUCTURA PRINCIPAL (2 COLUMNAS) --- */
        .app-container {
            display: flex; 
            display: -webkit-flex; /* iPad 2 */
            height: 100%;
            width: 100%;
        }

        /* --- BARRA LATERAL IZQUIERDA --- */
        .sidebar {
            width: 250px; 
            background-color: #eaebec; /* Color gris claro de tu imagen */
            border-right: 1px solid #d1d1d6;
            display: flex; 
            display: -webkit-flex; 
            flex-direction: column; 
            -webkit-flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 25px 20px;
            font-size: 22px; 
            font-weight: bold; 
            color: #000;
        }
        .sidebar-menu {
            flex-grow: 1; 
            -webkit-flex-grow: 1;
        }
        .menu-item {
            padding: 15px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .menu-item.active {
            background-color: #009688; /* Verde agua */
            color: white;
            font-weight: bold;
        }
        .sidebar-footer {
            padding: 20px;
            color: #009688;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }

        /* --- ÁREA PRINCIPAL (DERECHA) --- */
        .main-content {
            flex-grow: 1; 
            -webkit-flex-grow: 1;
            background-color: white;
            display: flex; 
            display: -webkit-flex; 
            flex-direction: column; 
            -webkit-flex-direction: column;
        }
        
        /* Barra superior */
        .top-bar {
            padding: 15px 30px;
            border-bottom: 1px solid #eaebec;
            display: flex; 
            display: -webkit-flex; 
            justify-content: space-between; 
            -webkit-justify-content: space-between;
            align-items: center; 
            -webkit-align-items: center;
        }
        .sync-status {
            color: #8e8e93;
            font-size: 16px;
        }
        .btn-guardar {
            background-color: #009688; 
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-guardar:hover {
            background-color: #00796b;
        }

        /* Zona de escritura */
        .editor-area {
            padding: 30px 40px;
            flex-grow: 1; 
            -webkit-flex-grow: 1;
            display: flex; 
            display: -webkit-flex; 
            flex-direction: column; 
            -webkit-flex-direction: column;
        }
        #cajaTitulo {
            width: 100%;
            border: none;
            outline: none;
            font-size: 32px;
            font-weight: bold;
            color: #000;
            margin-bottom: 20px;
            background: transparent;
        }
        #cajaTitulo::-webkit-input-placeholder { color: #ccc; }

        #cajaContenido {
            width: 100%;
            flex-grow: 1; 
            -webkit-flex-grow: 1;
            border: none;
            outline: none;
            resize: none;
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            font-family: Arial, Helvetica, sans-serif;
            background: transparent;
        }
        #cajaContenido::-webkit-input-placeholder { color: #d1d1d6; }
    </style>
</head>
<body>

    <div id="notificacion">✅ ¡Guardado!</div>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-header">Mis Notas</div>
            <div class="sidebar-menu">
                <div class="menu-item active">Todo (Web)</div>
                </div>
            <div class="sidebar-footer">+ Nueva Carpeta</div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="sync-status">Sincronizado</div>
                <button class="btn-guardar" onclick="guardarNota()">💾 Guardar</button>
            </header>
            
            <section class="editor-area">
                <input type="text" id="cajaTitulo" placeholder="Título de la nota">
                <textarea id="cajaContenido" placeholder="Comienza a escribir tu nota aquí..."></textarea>
            </section>
        </main>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Tus credenciales de Firebase
        var firebaseConfig = {
          apiKey: "AIzaSyDyuqn1K4k6oChD-WpvWCdxGq8N2P9h78Q",
          authDomain: "misnotas2529-83990.firebaseapp.com",
          databaseURL: "https://misnotas2529-83990-default-rtdb.firebaseio.com",
          projectId: "misnotas2529-83990",
          storageBucket: "misnotas2529-83990.firebasestorage.app",
          messagingSenderId: "457391422873",
          appId: "1:457391422873:web:5a1651bcc8cbb6c8f1a708"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        // Conectar con la interfaz
        var cajaTitulo = document.getElementById('cajaTitulo');
        var cajaContenido = document.getElementById('cajaContenido');
        var notificacion = document.getElementById('notificacion');

        // Cargar nota al entrar a la página
        cargarNota();

        // --- FUNCIONES (ES5 para que funcione en iPad 2) ---

        function cargarNota() {
            cajaTitulo.value = "Cargando...";
            cajaContenido.value = "Cargando...";

            database.ref('notas_compartidas/unica').on('value', function(snapshot) {
                if (snapshot.exists()) {
                    var datos = snapshot.val();
                    cajaTitulo.value = datos.titulo || "";
                    cajaContenido.value = datos.contenido || "";
                } else {
                    cajaTitulo.value = "";
                    cajaContenido.value = "";
                }
            });
        }

        function mostrarCheck() {
            notificacion.style.display = "block";
            // Desaparece solito después de 2 segundos (2000 ms)
            setTimeout(function() {
                notificacion.style.display = "none";
            }, 2000); 
        }

        function guardarNota() {
            database.ref('notas_compartidas/unica').set({
                titulo: cajaTitulo.value,
                contenido: cajaContenido.value
            }).then(function() {
                mostrarCheck();
            }).catch(function(error) {
                alert("Error de conexión: " + error);
            });
        }
    </script>
</body>
</html>
