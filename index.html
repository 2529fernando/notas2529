<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Notas y Archivos Cloud</title>
    <style>
        /* Evita problemas de desbordamiento en pantallas de tablets */
        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff; color: #333; overflow: hidden;
        }

        #notificacion {
            display: none; position: fixed; top: 15px; left: 50%;
            transform: translateX(-50%); -webkit-transform: translateX(-50%);
            background-color: #009688; color: white;
            padding: 12px 25px; border-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 16px; font-weight: bold; z-index: 2000;
        }

        .app-wrapper {
            display: flex; display: -webkit-flex;
            height: 100%; width: 100%;
        }

        .sidebar {
            width: 260px; flex-shrink: 0; -webkit-flex-shrink: 0;
            background-color: #eaebed; border-right: 1px solid #d1d1d6;
            display: flex; display: -webkit-flex; flex-direction: column; -webkit-flex-direction: column;
        }
        .sidebar-header { padding: 25px 20px; }
        .sidebar-title { margin: 0; font-size: 22px; font-weight: bold; color: #000; }
        .sidebar-content { flex-grow: 1; -webkit-flex-grow: 1; overflow-y: auto; }
        
        .folder-item { 
            padding: 12px 20px; cursor: pointer; color: #333; 
            font-size: 16px; font-weight: 500; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .folder-item:hover { background-color: rgba(0,0,0,0.05); }
        .folder-item.active { background-color: #009688; color: white; }
        
        .sidebar-section-title {
            padding: 20px 20px 5px 20px; font-size: 12px; 
            color: #8e8e93; font-weight: bold; text-transform: uppercase;
        }

        .editor-zone {
            flex-grow: 1; -webkit-flex-grow: 1; background-color: white;
            display: flex; display: -webkit-flex; flex-direction: column; -webkit-flex-direction: column;
            width: calc(100% - 260px); 
        }
        
        /* Cabecera del editor configurada para contener los botones */
        .editor-header {
            padding: 15px 40px 15px 30px; 
            border-bottom: 1px solid #e0e0e0;
            display: flex; display: -webkit-flex; justify-content: space-between; align-items: center;
        }
        #cajaTitulo {
            border: none; outline: none; background: transparent;
            font-size: 30px; font-weight: 700; color: #000;
            flex-grow: 1; -webkit-flex-grow: 1; 
            margin-right: 20px; font-family: inherit;
            min-width: 0; 
        }
        
        /* Contenedor alineado para mantener los dos botones en fila */
        .header-buttons {
            display: flex; display: -webkit-flex;
            align-items: center;
            flex-shrink: 0; -webkit-flex-shrink: 0;
        }

        /* BOTÓN DE SUBIR (Ahora arriba y de color Naranja) */
        .btn-subir-archivo {
            background-color: #ff5722; color: white; 
            padding: 10px 22px; border-radius: 20px; 
            cursor: pointer; font-weight: 600; font-size: 16px;
            white-space: nowrap; display: inline-block; text-align: center;
            margin-right: 12px; /* Separación con el botón de guardar */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.2s; -webkit-transition: background 0.2s;
        }
        .btn-subir-archivo:hover { background-color: #e64a19; }

        /* BOTÓN DE GUARDAR (Mantiene su color verde agua original) */
        .btn-save {
            padding: 10px 25px; border: none; border-radius: 20px;
            color: white; background-color: #009688;
            font-size: 16px; font-weight: 600; cursor: pointer;
            white-space: nowrap; transition: background 0.2s;
        }
        .btn-save:hover { background-color: #00796B; }

        .editor-content {
            flex-grow: 1; -webkit-flex-grow: 1; padding: 30px;
            display: flex; display: -webkit-flex; flex-direction: column; -webkit-flex-direction: column;
            overflow-y: auto;
        }
        #cajaContenido {
            width: 100%; flex-grow: 1; -webkit-flex-grow: 1;
            border: none; outline: none; resize: none;
            font-size: 19px; line-height: 1.6; color: #333; font-family: inherit;
        }
    </style>
</head>
<body>

    <div id="notificacion">✅ ¡Guardado!</div>

    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-title">Mis Notas</h1>
            </div>
            <nav class="sidebar-content">
                <div class="folder-item active">📝 Todo (Web)</div>
                
                <div class="sidebar-section-title">Archivos Subidos</div>
                <div id="listaArchivos"></div>
            </nav>
        </aside>

        <main class="editor-zone">
            <header class="editor-header">
                <input type="text" id="cajaTitulo" placeholder="Título de la nota">
                
                <div class="header-buttons">
                    <label for="inputArchivo" class="btn-subir-archivo">📎 Subir</label>
                    <input type="file" id="inputArchivo" style="display: none;">
                    
                    <button class="btn-save" onclick="guardarNota()">💾 Guardar</button>
                </div>
            </header>
            
            <article class="editor-content">
                <textarea id="cajaContenido" placeholder="Comienza a escribir tu nota aquí..."></textarea>
            </article>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        var firebaseConfig = {
          apiKey: "AIzaSyDyuqn1K4k6oChD-WpvWCdxGq8N2P9h78Q",
          authDomain: "misnotas2529-83990.firebaseapp.com",
          databaseURL: "https://misnotas2529-83990-default-rtdb.firebaseio.com",
          projectId: "misnotas2529-83990",
          storageBucket: "misnotas2529-83990.firebasestorage.app",
          messagingSenderId: "457391422873",
          appId: "1:457391422873:web:5a1651bcc8cbb6c8f1a708"
        };

        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        var cajaTitulo = document.getElementById('cajaTitulo');
        var cajaContenido = document.getElementById('cajaContenido');
        var notificacion = document.getElementById('notificacion');
        var inputArchivo = document.getElementById('inputArchivo');
        var listaArchivos = document.getElementById('listaArchivos');

        // 1. Cargar el texto de la nota principal
        database.ref('notas_compartidas/unica').on('value', function(snapshot) {
            if (snapshot.exists()) {
                var datos = snapshot.val();
                cajaTitulo.value = datos.titulo || "";
                cajaContenido.value = datos.contenido || "";
            }
        });

        // 2. Cargar y escuchar la lista de archivos
        database.ref('notas_compartidas/archivos').on('value', function(snapshot) {
            listaArchivos.innerHTML = ""; 
            
            if (snapshot.exists()) {
                snapshot.forEach(function(childSnapshot) {
                    var archivo = childSnapshot.val();
                    var divElement = document.createElement('div');
                    divElement.className = "folder-item";
                    divElement.innerText = "📄 " + archivo.nombre;
                    
                    divElement.onclick = function() {
                        window.open(archivo.url, '_blank');
                    };
                    
                    listaArchivos.appendChild(divElement);
                });
            } else {
                listaArchivos.innerHTML = '<div style="padding: 10px 20px; font-size: 14px; color: #aaa;">No hay archivos aún</div>';
            }
        });

        // 3. Subir archivo a cPanel
        inputArchivo.addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;

            var boton = document.querySelector('.btn-subir-archivo');
            var textoOriginal = boton.innerText;
            boton.innerText = "⏳ ...";
            boton.style.backgroundColor = "#e64a19"; // Cambia a naranja oscuro al procesar

            var formData = new FormData();
            formData.append("archivo", file); 

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "https://sebastech.website/subir_archivo.php", true);
            
            xhr.onload = function() {
                // Restauramos el botón naranja original
                boton.innerText = textoOriginal;
                boton.style.backgroundColor = "#ff5722";

                if (xhr.status === 200) {
                    try {
                        var respuesta = JSON.parse(xhr.responseText);
                        if (respuesta.exito) {
                            database.ref('notas_compartidas/archivos').push({
                                nombre: file.name,
                                url: respuesta.url
                            });
                            mostrarMensaje("✅ ¡Archivo Subido!");
                        } else {
                            alert("Error del servidor: " + respuesta.error);
                        }
                    } catch (err) {
                        alert("Error al procesar la respuesta del servidor.");
                    }
                } else {
                    alert("Error al conectar con cPanel.");
                }
            };
            
            xhr.send(formData);
        });

        function guardarNota() {
            database.ref('notas_compartidas/unica').set({
                titulo: cajaTitulo.value,
                contenido: cajaContenido.value
            }).then(function() {
                mostrarMensaje("✅ ¡Guardado!");
            }).catch(function(error) {
                alert("Error al guardar: " + error);
            });
        }

        function mostrarMensaje(texto) {
            notificacion.innerText = texto;
            notificacion.style.display = "block";
            setTimeout(function() { 
                notificacion.style.display = "none"; 
            }, 2000); 
        }
    </script>
</body>
</html>
