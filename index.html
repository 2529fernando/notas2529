<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espacio Compartido</title>
    <style>
        /* Aumentamos el tamaño de fuente general */
        body { 
            font-family: Arial, sans-serif; 
            background-color: #E0F7FA; 
            padding: 20px; 
            text-align: center; 
            font-size: 18px; 
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1); 
        }
        /* Letra más grande y más espacio para los campos de texto */
        input[type="text"], textarea { 
            width: 100%; 
            box-sizing: border-box; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-size: 20px; /* Letra más grande aquí */
        }
        textarea { 
            height: 400px; 
            resize: vertical; 
            font-family: inherit; 
            line-height: 1.5; /* Más espacio entre líneas para leer mejor */
        }
        /* Botón más grande y fácil de tocar */
        button { 
            padding: 15px 20px; 
            border: none; 
            border-radius: 8px; 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            background-color: #009688; 
            font-size: 20px;
        }
        button:hover { 
            background-color: #00796B; 
        }

        /* DISEÑO DEL AVISO FLOTANTE (CHECK) */
        #notificacion {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            -webkit-transform: translateX(-50%); /* Para que funcione en el iPad 2 */
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 18px;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="notificacion">✅ ¡Guardado!</div>

    <div id="app-content" class="container">
        <h2 style="color: #00796B;">Nota Compartida</h2>
        <input type="text" id="cajaTitulo" placeholder="Título">
        <textarea id="cajaContenido" placeholder="Escribe tu nota aquí..."></textarea>
        <button onclick="guardarNota()">💾 Guardar Cambios</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Configuración de Firebase
        var firebaseConfig = {
          apiKey: "AIzaSyDyuqn1K4k6oChD-WpvWCdxGq8N2P9h78Q",
          authDomain: "misnotas2529-83990.firebaseapp.com",
          databaseURL: "https://misnotas2529-83990-default-rtdb.firebaseio.com",
          projectId: "misnotas2529-83990",
          storageBucket: "misnotas2529-83990.firebasestorage.app",
          messagingSenderId: "457391422873",
          appId: "1:457391422873:web:5a1651bcc8cbb6c8f1a708"
        };

        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        var cajaTitulo = document.getElementById('cajaTitulo');
        var cajaContenido = document.getElementById('cajaContenido');
        var notificacion = document.getElementById('notificacion');

        cargarNota();

        function cargarNota() {
            cajaTitulo.value = "Cargando...";
            cajaContenido.value = "Cargando...";

            database.ref('notas_compartidas/unica').on('value', function(snapshot) {
                if (snapshot.exists()) {
                    var datos = snapshot.val();
                    cajaTitulo.value = datos.titulo || "";
                    cajaContenido.value = datos.contenido || "";
                } else {
                    cajaTitulo.value = "";
                    cajaContenido.value = "";
                }
            });
        }

        // Función para mostrar el aviso flotante y ocultarlo después de 2 segundos
        function mostrarCheck() {
            notificacion.style.display = "block";
            setTimeout(function() {
                notificacion.style.display = "none";
            }, 2000); // 2000 milisegundos = 2 segundos
        }

        function guardarNota() {
            database.ref('notas_compartidas/unica').set({
                titulo: cajaTitulo.value,
                contenido: cajaContenido.value
            }).then(function() {
                // Aquí quitamos el alert() y llamamos al nuevo diseño
                mostrarCheck();
            }).catch(function(error) {
                alert("Hubo un error al guardar: " + error);
            });
        }
    </script>
</body>
</html>
