<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Notas y Archivos Cloud</title>
    <style>
        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff; color: #333; overflow: hidden;
        }

        #notificacion {
            display: none; position: fixed; top: 15px; left: 50%;
            transform: translateX(-50%); -webkit-transform: translateX(-50%);
            background-color: #009688; color: white;
            padding: 12px 25px; border-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 16px; font-weight: bold; z-index: 4000;
        }

        #overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            z-index: 2500;
        }
        #overlay.active { display: block; }

        .app-wrapper {
            display: flex; display: -webkit-flex;
            height: 100%; width: 100%; position: relative;
        }

        /* --- BARRA LATERAL --- */
        .sidebar {
            width: 260px; flex-shrink: 0; -webkit-flex-shrink: 0;
            background-color: #eaebed; border-right: 1px solid #d1d1d6;
            display: flex; display: -webkit-flex; flex-direction: column; -webkit-flex-direction: column;
            z-index: 3000; height: 100%;
            transition: left 0.3s ease; -webkit-transition: left 0.3s ease;
        }
        .sidebar-header { padding: 25px 20px; }
        .sidebar-title { margin: 0; font-size: 22px; font-weight: bold; color: #000; }
        .sidebar-content { flex-grow: 1; -webkit-flex-grow: 1; overflow-y: auto; }
        
        .folder-item { 
            padding: 12px 20px; cursor: pointer; color: #333; 
            font-size: 16px; font-weight: 500; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .folder-item:hover { background-color: rgba(0,0,0,0.05); }
        .folder-item.active { background-color: #009688; color: white; }
        
        .sidebar-section-title {
            padding: 20px 20px 5px 20px; font-size: 12px; 
            color: #8e8e93; font-weight: bold; text-transform: uppercase;
        }

        /* --- ÁREA DE EDICIÓN --- */
        .editor-zone {
            flex-grow: 1; -webkit-flex-grow: 1; background-color: white;
            display: flex; display: -webkit-flex; flex-direction: column; -webkit-flex-direction: column;
            width: calc(100% - 260px); 
        }
        
        .editor-header {
            padding: 15px 40px 15px 30px; 
            border-bottom: 1px solid #e0e0e0;
            display: flex; display: -webkit-flex; justify-content: space-between; align-items: center;
        }
        
        .btn-menu {
            display: none; 
            background: none; border: none; font-size: 28px;
            color: #009688; cursor: pointer; padding: 0; margin-right: 15px;
        }

        #cajaTitulo {
            border: none; outline: none; background: transparent;
            font-size: 30px; font-weight: 700; color: #000;
            flex-grow: 1; -webkit-flex-grow: 1; 
            margin-right: 20px; font-family: inherit; min-width: 0; 
        }

        /* Contenedor para agrupar los botones de arriba */
        .header-actions {
            display: flex; display: -webkit-flex;
            align-items: center;
            gap: 10px;
        }
        
        /* EL BOTÓN NARANJA RESTAURADO */
        .btn-naranja {
            background-color: #FF9800; color: white; 
            padding: 10px 20px; border-radius: 20px; 
            cursor: pointer; font-weight: 600; font-size: 15px;
            white-space: nowrap; transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            display: inline-block;
        }
        .btn-naranja:hover { background-color: #F57C00; }

        .btn-save {
            padding: 10px 25px; border: none; border-radius: 20px;
            color: white; background-color: #009688;
            font-size: 16px; font-weight: 600; cursor: pointer;
            white-space: nowrap; transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .btn-save:hover { background-color: #00796B; }

        .editor-content {
            flex-grow: 1; -webkit-flex-grow: 1; padding: 30px;
            display: flex; display: -webkit-flex; flex-direction: column; -webkit-flex-direction: column;
            overflow-y: auto;
        }
        #cajaContenido {
            width: 100%; flex-grow: 1; -webkit-flex-grow: 1;
            border: none; outline: none; resize: none;
            font-size: 19px; line-height: 1.6; color: #333; font-family: inherit;
        }

        /* --- DISEÑO MÓVIL --- */
        @media (max-width: 768px) {
            .btn-menu { display: block; }
            .editor-zone { width: 100%; }
            .editor-header { padding: 15px 20px; }
            #cajaTitulo { font-size: 22px; }
            
            /* Ajuste para que quepan ambos botones en celular */
            .header-actions { gap: 5px; }
            .btn-naranja { padding: 10px 15px; font-size: 14px; }
            .btn-save { padding: 10px 15px; font-size: 14px; }
            
            .editor-content { padding: 20px; }
            
            .sidebar {
                position: absolute;
                left: -260px;
                box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            }
            .sidebar.open { left: 0; }
        }
    </style>
</head>
<body>

    <div id="notificacion">✅ ¡Guardado!</div>
    <div id="overlay"></div>

    <div class="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-title">Mis Notas</h1>
            </div>
            <nav class="sidebar-content">
                <div class="folder-item active" onclick="cerrarMenu()">📝 Todo (Web)</div>
                
                <div class="sidebar-section-title">Archivos Subidos</div>
                <div id="listaArchivos"></div>
            </nav>
        </aside>

        <main class="editor-zone">
            <header class="editor-header">
                <button id="btnMenu" class="btn-menu">☰</button>
                <input type="text" id="cajaTitulo" placeholder="Título de la nota">
                
                <div class="header-actions">
                    <label for="inputArchivo" id="labelSubir" class="btn-naranja">📎 Adjuntar</label>
                    <button class="btn-save" onclick="guardarNota()">💾 Guardar</button>
                </div>
            </header>
            
            <article class="editor-content">
                <input type="file" id="inputArchivo" style="display: none;">
                
                <textarea id="cajaContenido" placeholder="Comienza a escribir tu nota aquí..."></textarea>
            </article>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        var firebaseConfig = {
          apiKey: "AIzaSyDyuqn1K4k6oChD-WpvWCdxGq8N2P9h78Q",
          authDomain: "misnotas2529-83990.firebaseapp.com",
          databaseURL: "https://misnotas2529-83990-default-rtdb.firebaseio.com",
          projectId: "misnotas2529-83990",
          storageBucket: "misnotas2529-83990.firebasestorage.app",
          messagingSenderId: "457391422873",
          appId: "1:457391422873:web:5a1651bcc8cbb6c8f1a708"
        };

        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        var cajaTitulo = document.getElementById('cajaTitulo');
        var cajaContenido = document.getElementById('cajaContenido');
        var notificacion = document.getElementById('notificacion');
        var inputArchivo = document.getElementById('inputArchivo');
        var labelSubir = document.getElementById('labelSubir');
        var listaArchivos = document.getElementById('listaArchivos');
        
        // Elementos del menú móvil
        var btnMenu = document.getElementById('btnMenu');
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('overlay');

        btnMenu.onclick = function() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        };

        function cerrarMenu() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        overlay.onclick = cerrarMenu;

        // 1. Cargar el texto de la nota
        database.ref('notas_compartidas/unica').on('value', function(snapshot) {
            if (snapshot.exists()) {
                var datos = snapshot.val();
                cajaTitulo.value = datos.titulo || "";
                cajaContenido.value = datos.contenido || "";
            }
        });

        // 2. Cargar y escuchar la lista de archivos (con botón de eliminar)
        database.ref('notas_compartidas/archivos').on('value', function(snapshot) {
            listaArchivos.innerHTML = ""; 
            
            if (snapshot.exists()) {
                snapshot.forEach(function(childSnapshot) {
                    var archivo = childSnapshot.val();
                    var keyArchivo = childSnapshot.key;
                    
                    var divElement = document.createElement('div');
                    divElement.className = "folder-item";
                    divElement.style.display = "flex";
                    divElement.style.justifyContent = "space-between";
                    divElement.style.alignItems = "center";
                    
                    var spanText = document.createElement('span');
                    spanText.innerText = "📄 " + archivo.nombre;
                    spanText.style.overflow = "hidden";
                    spanText.style.textOverflow = "ellipsis";
                    spanText.style.whiteSpace = "nowrap";
                    spanText.style.flexGrow = "1";
                    spanText.onclick = function() {
                        window.open(archivo.url, '_blank');
                        cerrarMenu(); 
                    };
                    
                    var spanBorrar = document.createElement('span');
                    spanBorrar.innerText = "🗑️";
                    spanBorrar.style.marginLeft = "10px";
                    spanBorrar.style.fontSize = "18px";
                    spanBorrar.onclick = function(e) {
                        e.stopPropagation(); 
                        if(confirm("¿Seguro que deseas borrar este archivo para siempre?")) {
                            borrarArchivoWeb(keyArchivo, archivo.url);
                        }
                    };
                    
                    divElement.appendChild(spanText);
                    divElement.appendChild(spanBorrar);
                    listaArchivos.appendChild(divElement);
                });
            } else {
                listaArchivos.innerHTML = '<div style="padding: 10px 20px; font-size: 14px; color: #aaa;">No hay archivos aún</div>';
            }
        });

        // 3. Subir archivo a cPanel
        inputArchivo.addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;

            // Animación del botón naranja al subir
            labelSubir.innerText = "⏳ Subiendo...";
            labelSubir.style.backgroundColor = "#E65100"; // Naranja más oscuro

            var formData = new FormData();
            formData.append("archivo", file); 

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "https://sebastech.website/subir_archivo.php", true);
            
            xhr.onload = function() {
                // Restauramos el botón naranja
                labelSubir.innerText = "📎 Adjuntar";
                labelSubir.style.backgroundColor = "#FF9800";

                if (xhr.status === 200) {
                    try {
                        var respuesta = JSON.parse(xhr.responseText);
                        if (respuesta.exito) {
                            database.ref('notas_compartidas/archivos').push({
                                nombre: file.name,
                                url: respuesta.url
                            });
                            mostrarMensaje("✅ ¡Archivo Subido!");
                        } else {
                            alert("Error del servidor: " + respuesta.error);
                        }
                    } catch (err) {
                        alert("Error al procesar la respuesta del servidor.");
                    }
                } else {
                    alert("Error al conectar con cPanel.");
                }
            };
            
            xhr.send(formData);
        });

        // 4. Borrar archivo de cPanel y Firebase
        function borrarArchivoWeb(key, urlArchivo) {
            var formData = new FormData();
            formData.append("url", urlArchivo);

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "https://sebastech.website/borrar_archivo.php", true);
            xhr.onload = function() {
                database.ref('notas_compartidas/archivos').child(key).remove();
                mostrarMensaje("🗑️ ¡Archivo Eliminado!");
            };
            xhr.send(formData);
        }

        // 5. Guardar texto de la nota
        function guardarNota() {
            database.ref('notas_compartidas/unica').set({
                titulo: cajaTitulo.value,
                contenido: cajaContenido.value
            }).then(function() {
                mostrarMensaje("✅ ¡Guardado!");
            }).catch(function(error) {
                alert("Error al guardar: " + error);
            });
        }

        function mostrarMensaje(texto) {
            notificacion.innerText = texto;
            notificacion.style.display = "block";
            setTimeout(function() { 
                notificacion.style.display = "none"; 
            }, 2000); 
        }
    </script>
</body>
</html>
