<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espacio Compartido</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #E0F7FA; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        input[type="text"], textarea { width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; }
        textarea { height: 350px; resize: vertical; font-family: inherit; }
        button { padding: 12px 20px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; width: 100%; background-color: #009688; }
        button:hover { background-color: #00796B; }
    </style>
</head>
<body>

    <div id="app-content" class="container">
        <h2 style="color: #00796B;">Nota Compartida</h2>
        <input type="text" id="cajaTitulo" placeholder="Título">
        <textarea id="cajaContenido" placeholder="Escribe tu nota aquí..."></textarea>
        <button onclick="guardarNota()">💾 Guardar Cambios en la Nube</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Configuración de Firebase
        var firebaseConfig = {
          apiKey: "AIzaSyDyuqn1K4k6oChD-WpvWCdxGq8N2P9h78Q",
          authDomain: "misnotas2529-83990.firebaseapp.com",
          databaseURL: "https://misnotas2529-83990-default-rtdb.firebaseio.com",
          projectId: "misnotas2529-83990",
          storageBucket: "misnotas2529-83990.firebasestorage.app",
          messagingSenderId: "457391422873",
          appId: "1:457391422873:web:5a1651bcc8cbb6c8f1a708"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        var cajaTitulo = document.getElementById('cajaTitulo');
        var cajaContenido = document.getElementById('cajaContenido');

        cargarNota();

        // FUNCIONES TRADUCIDAS A ES5 (Compatible con iPad 2)
        function cargarNota() {
            cajaTitulo.value = "Cargando...";
            cajaContenido.value = "Cargando...";

            database.ref('notas_compartidas/unica').on('value', function(snapshot) {
                if (snapshot.exists()) {
                    var datos = snapshot.val();
                    cajaTitulo.value = datos.titulo || "";
                    cajaContenido.value = datos.contenido || "";
                } else {
                    cajaTitulo.value = "";
                    cajaContenido.value = "";
                }
            });
        }

        function guardarNota() {
            database.ref('notas_compartidas/unica').set({
                titulo: cajaTitulo.value,
                contenido: cajaContenido.value
            }).then(function() {
                alert("¡Datos actualizados correctamente! 📱↔️💻");
            }).catch(function(error) {
                alert("Hubo un error al guardar: " + error);
            });
        }
    </script>
</body>
</html>
